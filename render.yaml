# Render blueprint for the FastAPI backend (free, always-on web service).
# Render auto-detects this file when you create a "Blueprint" from the repo.
services:
  - type: web
    name: wc2026-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Pin Python to 3.12 — 3.13/3.14 lack prebuilt wheels for pinned deps
      # (pydantic-core/numpy), forcing a from-source Rust build that fails on
      # Render's read-only build disk.
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Set these in the Render dashboard (Environment tab). Leave blank to use
      # in-memory career sessions; set them to enable Supabase persistence.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
